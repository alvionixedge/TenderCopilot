# CI gate (spec 7.4): runs on every PR to main and every push to main.
# This is the only gate that blocks a merge; Vercel's Git integration
# performs the build/deploy after it passes.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck # tsc --noEmit
      - run: npm run lint
      - run: npm run test
