<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E6FB0"/>
      <stop offset="1" stop-color="#1F4E79"/>
    </linearGradient>
  </defs>
  <!-- Mark: a document with a checkmark + signal/AI spark -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="200" height="240" rx="28" fill="url(#g)"/>
    <!-- document lines -->
    <rect x="40" y="48" width="120" height="16" rx="8" fill="#FFFFFF" opacity="0.85"/>
    <rect x="40" y="84" width="120" height="16" rx="8" fill="#FFFFFF" opacity="0.6"/>
    <rect x="40" y="120" width="78" height="16" rx="8" fill="#FFFFFF" opacity="0.6"/>
    <!-- checkmark circle -->
    <circle cx="140" cy="172" r="46" fill="#FFFFFF"/>
    <path d="M118 172 l16 16 l30 -34" fill="none" stroke="#1F4E79" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- AI spark -->
    <path d="M44 168 l8 18 l18 8 l-18 8 l-8 18 l-8 -18 l-18 -8 l18 -8 z" fill="#7FB3E0"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(290,0)">
    <text x="0" y="150" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" fill="#1F4E79">TenderCopilot</text>
    <text x="0" y="232" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" fill="#2E6FB0">AI</text>
    <text x="118" y="226" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" letter-spacing="3" fill="#595959">PROCUREMENT &amp; BID MANAGEMENT</text>
  </g>
</svg>